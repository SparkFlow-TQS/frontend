name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd ui
        npm ci --legacy-peer-deps
    
    - name: Type check
      run: |
        cd ui
        npx tsc --noEmit
    
    - name: Lint
      run: |
        cd ui
        npm run lint
    
    - name: Build
      run: |
        cd ui
        npm run build
    
    - name: Run tests
      run: |
        cd ui
        npm run test -- --coverage 