sonar.projectKey=SparkFlow-TQS_frontend
sonar.organization=sparkflow-tqs
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=ui
sonar.exclusions=ui/node_modules/**,ui/.next/**,ui/out/**,ui/build/**,ui/dist/**,ui/package-lock.json,ui/coverage/**

# Test files location
sonar.tests=ui
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage reports
sonar.javascript.lcov.reportPaths=ui/coverage/lcov.info
# sonar.coverage.exclusions=**/*

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Branch coverage
# sonar.coverage.enabled=true

# Quality Gate
# sonar.qualitygate.wait=true 